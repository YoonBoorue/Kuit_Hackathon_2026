spring:
  datasource:
    url: jdbc:h2:mem:hackathon;MODE=PostgreSQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: kuit-hackathon-2026

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hackathon_db}
    username: ${SPRING_DATASOURCE_USERNAME:appuser}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

app:
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      model: ${GEMINI_MODEL:gemini-3.5-flash}
      timeout-ms: ${GEMINI_TIMEOUT_MS:10000}
  image:
    s3:
      bucket: ${IMAGE_S3_BUCKET:summer-survival-mail-images-1}
      region: ${IMAGE_S3_REGION:ap-northeast-2}
      public-base-url: ${IMAGE_S3_PUBLIC_BASE_URL:https://summer-survival-mail-images-1.s3.ap-northeast-2.amazonaws.com}
      card-prefix: ${IMAGE_S3_CARD_PREFIX:cards}
      max-size-bytes: ${IMAGE_MAX_SIZE_BYTES:5242880}
